<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVR – Varför rörde sig min fond idag?</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0e0e;
  --bg-card: #1a1a1a;
  --bg-card2: #222222;
  --bg-hover: #2a2a2a;
  --bg-pill: #2e2e2e;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f0;
  --text-muted: #888;
  --text-dim: #555;
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --accent: #5b7cff;
  --accent-dim: rgba(91,124,255,0.15);
}
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
.topbar { height: 52px; background: #111; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 1.5rem; gap: 1rem; }
.topbar-logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; margin-right: 0.5rem; }
.logo-icon { width: 28px; height: 28px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: black; }
.index-pill { display: flex; align-items: center; gap: 6px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 100px; padding: 4px 12px; font-size: 12px; color: var(--text-muted); }
.index-pill .chg.up { color: var(--green); font-weight: 500; }
.index-pill .chg.down { color: var(--red); font-weight: 500; }
.topbar-right { margin-left: auto; display: flex; gap: 8px; }
.topbar-btn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 5px 14px; color: var(--text); font-size: 12px; font-family: inherit; cursor: pointer; }
.topbar-btn.primary { background: white; color: black; border-color: white; font-weight: 500; }
.layout { display: flex; min-height: calc(100vh - 52px); }
.sidebar { width: 220px; flex-shrink: 0; background: #111; border-right: 1px solid var(--border); padding: 1rem 0.75rem; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; color: var(--text-muted); font-size: 13px; cursor: pointer; margin-bottom: 2px; }
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--bg-pill); color: var(--text); font-weight: 500; }
.nav-sep { margin: 8px 0; border-top: 1px solid var(--border); }
.nav-section { padding: 0 10px; margin: 8px 0 4px; font-size: 10px; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; }
.main { flex: 1; padding: 2rem 2.5rem; max-width: 860px; }
.page-title { font-size: 22px; font-weight: 600; margin-bottom: 1.25rem; }
.tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; }
.tab { padding: 5px 16px; border-radius: 100px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: inherit; transition: all 0.1s; }
.tab:hover { background: var(--bg-hover); color: var(--text); }
.tab.active { background: white; color: black; border-color: white; font-weight: 500; }
.market-context { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.mc-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
.mc-title { font-weight: 500; font-size: 14px; }
.mc-chips { display: flex; gap: 8px; flex-shrink: 0; }
.mc-chip { background: var(--bg-card2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 11px; }
.mc-chip .idx { color: var(--text-muted); margin-bottom: 2px; }
.mc-chip .chg.up { color: var(--green); font-weight: 500; }
.mc-chip .chg.down { color: var(--red); font-weight: 500; }
.fund-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.fund-tab { padding: 5px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-muted); font-family: inherit; transition: all 0.1s; }
.fund-tab:hover { background: var(--bg-hover); color: var(--text); }
.fund-tab.active { background: var(--bg-pill); color: var(--text); border-color: rgba(255,255,255,0.15); }
.stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.25rem; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
.stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
.stat-value { font-size: 20px; font-weight: 600; }
.stat-value.up { color: var(--green); }
.stat-value.down { color: var(--red); }
.stat-value.neutral { color: var(--text); }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 14px; font-weight: 500; }
.return-badge { font-size: 13px; font-weight: 600; padding: 3px 10px; border-radius: 100px; }
.return-badge.up { background: var(--green-dim); color: var(--green); }
.return-badge.down { background: var(--red-dim); color: var(--red); }
.holdings-row { display: grid; grid-template-columns: repeat(5,1fr); border-bottom: 1px solid var(--border); }
.holding-cell { padding: 12px 14px; border-right: 1px solid var(--border); cursor: pointer; transition: background 0.1s; position: relative; }
.holding-cell:last-child { border-right: none; }
.holding-cell:hover { background: var(--bg-hover); }
.holding-cell.active { background: var(--bg-card2); }
.holding-cell.active::after { content:''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
.holding-ticker { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
.holding-chg { font-size: 12px; }
.holding-chg.up { color: var(--green); }
.holding-chg.down { color: var(--red); }
.ai-panel { padding: 1.5rem 1.75rem; min-height: 220px; }
.ai-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 180px; gap: 12px; }
.ai-spinner { width: 28px; height: 28px; border: 2px solid rgba(255,255,255,0.08); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.ai-loading-text { font-size: 12px; color: var(--text-muted); }
.ai-error { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 180px; gap: 10px; color: var(--red); font-size: 13px; text-align: center; }
.ai-result { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
.section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 10px; }
.ai-summary { font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: 1.25rem; padding: 14px 16px; background: var(--accent-dim); border-radius: 10px; border-left: 2px solid var(--accent); }
.news-list { display: flex; flex-direction: column; gap: 6px; }
.news-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: var(--bg-card2); border-radius: 8px; border: 1px solid var(--border); }
.news-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.news-dot.up { background: var(--green); }
.news-dot.down { background: var(--red); }
.news-dot.flat { background: #666; }
.news-body { flex: 1; }
.news-text { font-size: 13px; color: var(--text); line-height: 1.5; }
.news-source { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.ai-footer { margin-top: 1.25rem; padding-top: 12px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.ai-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
.ai-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
.refresh-btn { font-family: inherit; font-size: 11px; color: var(--text-muted); background: var(--bg-card2); border: 1px solid var(--border); border-radius: 100px; padding: 4px 12px; cursor: pointer; transition: all 0.1s; }
.refresh-btn:hover { background: var(--bg-hover); color: var(--text); }
@media (max-width: 640px) {
  .sidebar { display: none; }
  .main { padding: 1.25rem 1rem; }
  .holdings-row { grid-template-columns: repeat(3,1fr); }
  .stat-grid { grid-template-columns: repeat(2,1fr); }
  .mc-chips { display: none; }
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo"><div class="logo-icon">S</div>SAVR</div>
  <div class="index-pill"><span style="font-size:10px">🇸🇪</span> OMXS30 <span class="chg up">+1,20%</span></div>
  <div class="index-pill"><span style="font-size:10px">🇺🇸</span> NASDAQ <span class="chg up">+0,92%</span></div>
  <div class="topbar-right">
    <button class="topbar-btn">Ordrar 0</button>
    <button class="topbar-btn primary">Sätt in pengar</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="nav-item active">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
      Hem
    </div>
    <div class="nav-sep"></div>
    <div class="nav-section">Innehav</div>
    <div class="nav-item" style="justify-content:space-between">
      <span style="display:flex;align-items:center;gap:10px">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 13V7M6 13V4M9 13V6M12 13V3"/></svg>
        ISK
      </span>
      <span style="font-size:12px;color:var(--text-dim)">0 kr</span>
    </div>
    <div class="nav-sep"></div>
    <div class="nav-item">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8h12M2 4h12M2 12h8"/></svg>
      Bevaka
    </div>
    <div class="nav-item">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4"/><path d="M10 10l3 3"/></svg>
      Upptäck
    </div>
  </div>

  <div class="main">
    <div class="page-title">Hem</div>
    <div class="tabs">
      <button class="tab active">För dig</button>
      <button class="tab">Favoriter</button>
    </div>

    <div class="market-context">
      <div>
        <div class="mc-label">Marknaden • just nu</div>
        <div class="mc-title">Varför rörde sig din fond idag?</div>
      </div>
      <div class="mc-chips">
        <div class="mc-chip"><div class="idx">OMXS30</div><div class="chg up">+1,20%</div></div>
        <div class="mc-chip"><div class="idx">NASDAQ</div><div class="chg up">+0,92%</div></div>
        <div class="mc-chip"><div class="idx">Bitcoin</div><div class="chg up">+2,44%</div></div>
      </div>
    </div>

    <div class="fund-tabs">
      <button class="fund-tab active" onclick="selectFund(this,'global')">Länsförsäkringar Global</button>
      <button class="fund-tab" onclick="selectFund(this,'tech')">Robur Technology</button>
      <button class="fund-tab" onclick="selectFund(this,'hallbar')">SPP Global Hållbar</button>
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Daglig avkastning</div><div class="stat-value" id="stat-return">–</div></div>
      <div class="stat-card"><div class="stat-label">Ditt innehav</div><div class="stat-value neutral" id="stat-holding">–</div></div>
      <div class="stat-card"><div class="stat-label">Förändring (kr)</div><div class="stat-value" id="stat-change">–</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title" id="card-title">Länsförsäkringar Global</div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="return-badge" id="return-badge">–</span>
          <span style="font-size:12px;color:var(--text-muted)">idag</span>
        </div>
      </div>
      <div class="holdings-row" id="holdings-row"></div>
      <div class="ai-panel" id="ai-panel">
        <div class="ai-loading"><div class="ai-spinner"></div><div class="ai-loading-text">Analyserar nyheter med AI…</div></div>
      </div>
    </div>
  </div>
</div>

<script>
// *** KLISTRA IN DIN ANTHROPIC API-NYCKEL HÄR ***
const API_KEY = 'sk-ant-XXXX-din-nyckel-här';
// Hämta på: https://console.anthropic.com/settings/keys

const today = new Date().toLocaleDateString('sv-SE');

function buildPrompt(name, ret, holdings) {
  return `You are a financial analyst for the Swedish investment app SAVR. Date: ${today}. Fund: ${name}. Daily return: ${ret}. Holdings: ${holdings.join(', ')}. Use web search to find actual recent news affecting these stocks. Write a brief, friendly explanation in Swedish for a retail investor of WHY the fund moved today. Respond ONLY with valid JSON (no markdown, no preamble): {"summary":"2-3 sentence explanation in Swedish","news":[{"text":"max 15 word news item in Swedish","sentiment":"down","source":"Reuters"},{"text":"max 15 word news item in Swedish","sentiment":"up","source":"Bloomberg"},{"text":"max 15 word news item in Swedish","sentiment":"down","source":"FT"},{"text":"max 15 word news item in Swedish","sentiment":"flat","source":"CNBC"}]}`;
}

const FUNDS = {
  global: {
    name:'Länsförsäkringar Global', ret:'-1,2%', retDir:'down',
    holding:'82 400 kr', change:'-998 kr', changeDir:'down',
    holdings:[{t:'NVDA',c:'-2,8%',d:'down'},{t:'AAPL',c:'+0,4%',d:'up'},{t:'MSFT',c:'-1,1%',d:'down'},{t:'AMZN',c:'-0,7%',d:'down'},{t:'GOOGL',c:'-0,9%',d:'down'}],
    prompt: buildPrompt('Länsförsäkringar Global','-1,2%',['NVDA -2,8%','AAPL +0,4%','MSFT -1,1%','AMZN -0,7%','GOOGL -0,9%'])
  },
  tech: {
    name:'Robur Technology', ret:'-2,1%', retDir:'down',
    holding:'45 200 kr', change:'-950 kr', changeDir:'down',
    holdings:[{t:'NVDA',c:'-2,8%',d:'down'},{t:'META',c:'-1,5%',d:'down'},{t:'TSLA',c:'-3,2%',d:'down'},{t:'MSFT',c:'-1,1%',d:'down'},{t:'ASML',c:'+0,3%',d:'up'}],
    prompt: buildPrompt('Robur Technology','-2,1%',['NVDA -2,8%','META -1,5%','TSLA -3,2%','MSFT -1,1%','ASML +0,3%'])
  },
  hallbar: {
    name:'SPP Global Hållbar', ret:'+0,3%', retDir:'up',
    holding:'121 800 kr', change:'+366 kr', changeDir:'up',
    holdings:[{t:'MSFT',c:'-1,1%',d:'down'},{t:'NOVO-B',c:'+2,1%',d:'up'},{t:'LVMH',c:'+0,8%',d:'up'},{t:'SAP',c:'+1,2%',d:'up'},{t:'AAPL',c:'+0,4%',d:'up'}],
    prompt: buildPrompt('SPP Global Hållbar','+0,3%',['MSFT -1,1%','NOVO-B +2,1%','LVMH +0,8%','SAP +1,2%','AAPL +0,4%'])
  }
};

let current = 'global';
const cache = {};

function selectFund(btn, key) {
  document.querySelectorAll('.fund-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  current = key;
  renderFund(key);
}

function renderFund(key) {
  const f = FUNDS[key];
  document.getElementById('card-title').textContent = f.name;
  const badge = document.getElementById('return-badge');
  badge.textContent = f.ret; badge.className = 'return-badge ' + f.retDir;
  const sr = document.getElementById('stat-return');
  sr.textContent = f.ret; sr.className = 'stat-value ' + f.retDir;
  document.getElementById('stat-holding').textContent = f.holding;
  const sc = document.getElementById('stat-change');
  sc.textContent = f.change; sc.className = 'stat-value ' + f.changeDir;
  document.getElementById('holdings-row').innerHTML = f.holdings.map((h,i) =>
    `<div class="holding-cell${i===0?' active':''}" onclick="activateCell(this)"><div class="holding-ticker">${h.t}</div><div class="holding-chg ${h.d}">${h.c}</div></div>`
  ).join('');
  loadAI(key);
}

function activateCell(el) {
  document.querySelectorAll('.holding-cell').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

async function loadAI(key) {
  if (cache[key]) { renderResult(cache[key]); return; }
  document.getElementById('ai-panel').innerHTML = `<div class="ai-loading"><div class="ai-spinner"></div><div class="ai-loading-text">Hämtar nyheter och analyserar med AI…</div></div>`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: FUNDS[key].prompt }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(JSON.stringify(data.error));
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    cache[key] = parsed;
    renderResult(parsed);
  } catch(e) {
    document.getElementById('ai-panel').innerHTML = `<div class="ai-error"><div>Fel: ${e.message}</div><button class="refresh-btn" onclick="delete cache['${key}'];loadAI('${key}')">Försök igen</button></div>`;
  }
}

function renderResult(data) {
  document.getElementById('ai-panel').innerHTML = `
    <div class="ai-result">
      <div class="section-label">Dagens AI-analys</div>
      <div class="ai-summary">${data.summary}</div>
      <div class="section-label" style="margin-top:1rem">Nyheter som påverkat</div>
      <div class="news-list">${data.news.map(n=>`
        <div class="news-item">
          <div class="news-dot ${n.sentiment}"></div>
          <div class="news-body"><div class="news-text">${n.text}</div><div class="news-source">${n.source}</div></div>
        </div>`).join('')}
      </div>
      <div class="ai-footer">
        <div class="ai-badge"><div class="ai-dot"></div> Genererad av Claude AI med webbtillgång · ${today}</div>
        <button class="refresh-btn" onclick="delete cache['${current}'];loadAI('${current}')">↻ Uppdatera</button>
      </div>
    </div>`;
}

renderFund('global');
</script>
</body>
</html>
